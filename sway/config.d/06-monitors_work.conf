### MONITOR AND WORKSPACE CONFIGURATION

## Monitor Setup ()
output DP-5 pos 0 0 res 1920x1080
output DP-2 pos 1920 0 res 1920x1080
output eDP-1 pos 3840 0 res 1366x768

## Workspace Variables
set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"
set $ws10 "10"

## Workspace Assignments (Distribución solicitada)
# Laptop (eDP-1): Workspaces 1, 2, 3
workspace $ws1 output eDP-1
workspace $ws2 output eDP-1
workspace $ws3 output eDP-1

# Centro (DP-2): Workspaces 4, 5, 6, 7
workspace $ws4 output DP-2
workspace $ws5 output DP-2
workspace $ws6 output DP-2
workspace $ws7 output DP-2

# Izquierda (DP-5): Workspaces 8, 9, 10
workspace $ws8 output DP-5
workspace $ws9 output DP-5
workspace $ws10 output DP-5

## Workspace Layout
workspace_layout tabbed