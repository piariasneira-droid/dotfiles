### Main Keybindings
# Terminal and Essentials
bindsym $mod+Return exec $term
bindsym $mod+q kill
bindsym $mod+d exec rofi -show
bindsym $mod+Ctrl+q reload
bindsym $mod+Ctrl+w exec ~/.config/sway/scripts/execwaybar.sh
bindsym $mod+a exec ~/.config/sway/scripts/theater.sh
bindsym $mod+Ctrl+a exec ~/Themes/generate.sh
bindsym $mod+Ctrl+t exec swaymsg output eDP-1 dpms off
bindsym $mod+Ctrl+y exec swaymsg output eDP-1 dpms on
bindsym $mod+Ctrl+s exec bash ~/Themes/switch-theme.sh

# Power menu (replaces direct exit)
bindsym $alt+q exec ~/.config/sway/scripts/powermenu.sh

# Lock screen
bindsym $mod+l exec swaylock --daemonize

# Quick Application Shortcuts
bindsym $mod+b exec $browser
bindsym $mod+e exec $fmgr
bindsym $mod+w exec code
bindsym $mod+t exec MOZ_ENABLE_WAYLAND=1 $HOME/Apps/tor-browser/Browser/start-tor-browser

### Workspace Navigation
bindsym $mod+1 workspace $ws1
bindsym $mod+2 workspace $ws2
bindsym $mod+3 workspace $ws3
bindsym $mod+4 workspace $ws4
bindsym $mod+5 workspace $ws5
bindsym $mod+6 workspace $ws6
bindsym $mod+7 workspace $ws7
bindsym $mod+8 workspace $ws8
bindsym $mod+9 workspace $ws9
bindsym $mod+0 workspace $ws10

### Move Container to Workspace
bindsym $mod+Shift+1 move container to workspace $ws1
bindsym $mod+Shift+2 move container to workspace $ws2
bindsym $mod+Shift+3 move container to workspace $ws3
bindsym $mod+Shift+4 move container to workspace $ws4
bindsym $mod+Shift+5 move container to workspace $ws5
bindsym $mod+Shift+6 move container to workspace $ws6
bindsym $mod+Shift+7 move container to workspace $ws7
bindsym $mod+Shift+8 move container to workspace $ws8
bindsym $mod+Shift+9 move container to workspace $ws9
bindsym $mod+Shift+0 move container to workspace $ws10

### Window Management
bindsym $mod+f fullscreen
bindsym $mod+Shift+space floating toggle
bindsym $mod+space floating toggle

# Move Focus (Arrows)
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

### Screenshots
bindsym Print exec grim ~/Imagenes/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bindsym $mod+Print exec grim -g "$(slurp)" - | wl-copy
bindsym $mod+Shift+s exec grim -g "$(slurp)" - | swappy -f -
